version: '3.5'

services:
  api:
    image: api
    hostname: app
    build: .
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '2GB'
    expose:
      - "80"
    ports:
      - "8080:8080"
    restart: always
  db:
    image: postgres:latest

    environment:
      POSTGRES_DB: XXXXX
      POSTGRES_USER: YYYYY
      POSTGRES_PASSWORD: ZZZZZ
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '1GB'
    ports:
      - "6050:5432"
    restart: always